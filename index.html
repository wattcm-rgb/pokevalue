<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leo's Pokédex</title>
<meta name="description" content="Leo's Pokémon catalogue and card collection tracker, powered by PokéAPI.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23EE1515%22 stroke=%22%23222%22 stroke-width=%224%22/><path d=%22M5 50h90%22 stroke=%22%23222%22 stroke-width=%228%22/><circle cx=%2250%22 cy=%2250%22 r=%2214%22 fill=%22%23fff%22 stroke=%22%23222%22 stroke-width=%226%22/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

<header class="site-header">
  <div class="header-inner">
    <div class="brand">
      <span class="pokeball" aria-hidden="true"></span>
      <h1>Leo's Pokédex</h1>
    </div>
    <p class="tagline">Track which cards you've got — powered by PokéAPI.</p>
  </div>
</header>

<main>
  <section class="controls" aria-label="Search and filters">
    <div class="search-row">
      <input id="search-input" type="search" placeholder="Search by name or number…" aria-label="Search Pokémon">
      <span id="result-count" class="result-count"></span>
    </div>

    <div class="filter-group">
      <div class="filter-label">Type</div>
      <div id="type-chips" class="chip-row" role="group" aria-label="Filter by type"></div>
    </div>
  </section>

  <div class="tab-bar" role="tablist">
    <button type="button" class="tab-btn active" data-tab="catalogue" role="tab" aria-selected="true">Catalogue</button>
    <button type="button" class="tab-btn" data-tab="my-cards" role="tab" aria-selected="false">My Cards</button>
  </div>

  <section id="catalogue-view">
    <section id="grid-status" class="grid-status" aria-live="polite"></section>
    <section id="catalogue-grid" class="catalogue-grid" aria-label="Pokémon catalogue"></section>
    <div id="sentinel" class="sentinel" aria-hidden="true"></div>
  </section>

  <section id="my-cards-view" hidden>
    <section id="my-cards-grid" class="catalogue-grid" aria-label="My cards"></section>
  </section>
</main>

<footer class="site-footer">
  <p>Data from <a href="https://pokeapi.co/" target="_blank" rel="noopener">PokéAPI</a>. Pokémon and Pokémon character names are trademarks of Nintendo.</p>
</footer>

</div>

<div id="modal-overlay" class="modal-overlay" hidden>
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-name">
    <button id="modal-close" class="modal-close" aria-label="Close">&times;</button>
    <div id="modal-body" class="modal-body">
      <div class="modal-loading">Loading…</div>
    </div>
  </div>
</div>

<script src="js/types.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
